<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Family Group Hub V1.2</title>
  <style>
    :root {
      color-scheme: light;
      --surface-app: #efebea;
      --surface-card: #fbf8f7;
      --surface-card-raised: #ffffff;
      --surface-subtle: #e4ddda;
      --surface-accent: #eaf0f4;

      --text-primary: #283640;
      --text-secondary: #56636d;
      --text-tertiary: #75828b;
      --text-on-color: #ffffff;

      --border-default: #d2cfcd;
      --border-strong: #b3bbc2;
      --focus-ring: rgba(106, 126, 144, 0.28);

      --action-primary: #c98d86;
      --action-primary-hover: #bb7d76;
      --action-primary-pressed: #a86b65;
      --action-secondary: #e5edf2;
      --action-secondary-hover: #dae5eb;

      --success: #4f8b75;
      --success-soft: rgba(79, 139, 117, 0.12);
      --warning: #b58845;
      --warning-soft: rgba(181, 136, 69, 0.12);
      --danger: #bf6860;
      --danger-soft: rgba(191, 104, 96, 0.12);
      --info: #6e879d;
      --info-soft: rgba(110, 135, 157, 0.12);
      --neutral: #7b7674;
      --neutral-soft: rgba(123, 118, 116, 0.12);

      --member-lavender: #8f7895;
      --member-lavender-soft: #efe7ee;
      --member-lavender-border: #cfbecf;

      --member-navy: #53697d;
      --member-navy-soft: #e4ebf1;
      --member-navy-border: #b7c4cf;

      --member-teal: #5f7d79;
      --member-teal-soft: #e7efee;
      --member-teal-border: #bfd0cd;

      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 20px;
      --radius-full: 999px;

      --shadow-0: none;
      --shadow-1: 0 8px 24px rgba(34, 28, 33, 0.06);
      --shadow-2: 0 12px 32px rgba(34, 28, 33, 0.10);
      --shadow-3: 0 18px 48px rgba(34, 28, 33, 0.18);

      --sidebar-width: 272px;
      --mobile-nav-height: 78px;
      --max-page-width: 1440px;
      --topbar-height: 84px;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --surface-app: #161c22;
      --surface-card: #1d252d;
      --surface-card-raised: #242d36;
      --surface-subtle: #2d3741;
      --surface-accent: #30404b;

      --text-primary: #eef1f3;
      --text-secondary: #c7ced4;
      --text-tertiary: #9fabb5;
      --text-on-color: #ffffff;

      --border-default: #3a4652;
      --border-strong: #556474;
      --focus-ring: rgba(154, 177, 197, 0.24);

      --action-primary: #d39a93;
      --action-primary-hover: #deb0aa;
      --action-primary-pressed: #c4847d;
      --action-secondary: #2a3641;
      --action-secondary-hover: #33424f;

      --success: #77b29b;
      --success-soft: rgba(119, 178, 155, 0.14);
      --warning: #d5aa68;
      --warning-soft: rgba(213, 170, 104, 0.14);
      --danger: #df8c84;
      --danger-soft: rgba(223, 140, 132, 0.14);
      --info: #96b2c9;
      --info-soft: rgba(150, 178, 201, 0.14);
      --neutral: #a8afb4;
      --neutral-soft: rgba(168, 175, 180, 0.14);

      --member-lavender-soft: rgba(143, 120, 149, 0.2);
      --member-navy-soft: rgba(83, 105, 125, 0.28);
      --member-teal-soft: rgba(95, 125, 121, 0.28);

      --shadow-1: 0 10px 24px rgba(0, 0, 0, 0.22);
      --shadow-2: 0 14px 34px rgba(0, 0, 0, 0.28);
      --shadow-3: 0 22px 54px rgba(0, 0, 0, 0.36);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--surface-app);
      color: var(--text-primary);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    img { max-width: 100%; }
    [hidden] { display: none !important; }
    :focus-visible { outline: none; box-shadow: 0 0 0 3px var(--focus-ring); }

    .app-shell {
      min-height: 100dvh;
      display: grid;
      grid-template-columns: 1fr;
    }

    .desktop-sidebar {
      display: none;
      padding: 16px 0 16px 16px;
    }

    .desktop-sidebar__wrap {
      position: sticky;
      top: 0;
      height: 100dvh;
      padding: 0;
    }

    .desktop-sidebar__panel,
    .surface-card {
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-1);
      min-width: 0;
    }

    .surface-card--raised {
      background: var(--surface-card-raised);
      box-shadow: var(--shadow-2);
    }

    .surface-card--padded { padding: 16px; }

    .desktop-sidebar__panel {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px 16px;
      border-radius: var(--radius-lg);
      background: var(--surface-card-raised);
    }

    .desktop-sidebar__brand h2,
    .app-brand h1 {
      margin: 0;
      font-size: clamp(1.125rem, 1vw + 1rem, 1.5rem);
      line-height: 1.2;
    }

    .desktop-sidebar__brand p,
    .app-brand p {
      margin: 6px 0 0;
      color: var(--text-secondary);
      font-size: 0.9375rem;
    }

    .desktop-sidebar__nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .desktop-sidebar__link,
    .mobile-bottom-nav__link {
      min-height: 46px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      text-align: center;
      color: var(--text-secondary);
      font-weight: 700;
      transition: background 140ms ease, color 140ms ease, transform 140ms ease;
    }

    .desktop-sidebar__link:hover,
    .mobile-bottom-nav__link:hover {
      transform: translateY(-1px);
    }

    .desktop-sidebar__link--active,
    .mobile-bottom-nav__link--active {
      background: var(--action-secondary);
      color: var(--text-primary);
    }

    .app-main {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .app-topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: color-mix(in srgb, var(--surface-app) 90%, transparent);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-default);
    }

    .app-topbar__inner {
      max-width: var(--max-page-width);
      margin: 0 auto;
      min-height: var(--topbar-height);
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 12px;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }

    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .page-shell {
      flex: 1;
      width: 100%;
      max-width: var(--max-page-width);
      margin: 0 auto;
      padding: 24px 20px calc(var(--mobile-nav-height) + 24px);
    }

    .page-stack { display: flex; flex-direction: column; gap: 24px; }
    .page-intro { display: flex; flex-direction: column; gap: 12px; }

    .hero-card { padding: 20px; }
    .hero-card h2 {
      margin: 0;
      font-size: clamp(1.5rem, 1vw + 1.2rem, 2rem);
      line-height: 1.15;
    }
    .hero-card p {
      margin: 8px 0 0;
      color: var(--text-secondary);
      max-width: 74ch;
    }

    .eyebrow {
      color: var(--text-tertiary);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .muted { color: var(--text-secondary); }
    .tiny { color: var(--text-tertiary); font-size: 0.85rem; }

    .section-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
    }
    .section-header__copy { min-width: 0; }
    .section-header__title {
      margin: 0;
      font-size: 1.125rem;
      line-height: 1.25;
    }
    .section-header__helper {
      margin: 6px 0 0;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .btn {
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 700;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease, transform 120ms ease;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn--primary { background: var(--action-primary); color: var(--text-on-color); }
    .btn--primary:hover { background: var(--action-primary-hover); }
    .btn--secondary { background: var(--action-secondary); color: var(--text-primary); border-color: var(--border-default); }
    .btn--secondary:hover { background: var(--action-secondary-hover); }
    .btn--ghost { background: transparent; color: var(--text-primary); border-color: var(--border-default); }
    .btn--destructive { background: var(--danger-soft); color: var(--danger); border-color: color-mix(in srgb, var(--danger) 30%, transparent); }
    .btn--block { width: 100%; }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .field,
    .field-select,
    .field-textarea {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-default);
      background: var(--surface-card-raised);
      color: var(--text-primary);
    }

    .field-textarea {
      min-height: 96px;
      resize: vertical;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-size: 0.92rem; font-weight: 700; }
    .field-help { color: var(--text-tertiary); font-size: 0.85rem; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-default);
      background: var(--surface-subtle);
      color: var(--text-secondary);
      font-size: 0.875rem;
      line-height: 1;
    }

    .toolbar-cluster,
    .chip-row,
    .inline-actions,
    .summary-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card__label { color: var(--text-secondary); font-size: 0.875rem; }
    .stat-card__value {
      margin-top: 8px;
      font-size: clamp(1.35rem, 1vw + 1.15rem, 2rem);
      line-height: 1.1;
      font-weight: 700;
    }
    .stat-card__note { margin-top: 8px; color: var(--text-tertiary); font-size: 0.875rem; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 6px 10px;
      border-radius: var(--radius-full);
      font-size: 0.8125rem;
      font-weight: 700;
      line-height: 1;
      border: 1px solid transparent;
    }
    .badge--neutral { background: var(--neutral-soft); color: var(--neutral); border-color: color-mix(in srgb, var(--neutral) 24%, transparent); }
    .badge--info { background: var(--info-soft); color: var(--info); border-color: color-mix(in srgb, var(--info) 24%, transparent); }
    .badge--success { background: var(--success-soft); color: var(--success); border-color: color-mix(in srgb, var(--success) 24%, transparent); }
    .badge--warning { background: var(--warning-soft); color: var(--warning); border-color: color-mix(in srgb, var(--warning) 24%, transparent); }
    .badge--danger { background: var(--danger-soft); color: var(--danger); border-color: color-mix(in srgb, var(--danger) 24%, transparent); }

    .member-strip {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .member-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      background: var(--surface-card);
      color: var(--text-primary);
      padding: 16px;
      min-height: 56px;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }
    .member-card:hover { transform: translateY(-1px); }
    .member-card--active { border-width: 1.5px; box-shadow: var(--shadow-2); }
    .member-card__name { margin: 0; font-size: 1rem; font-weight: 700; }
    .member-card__sub { margin: 6px 0 0; color: var(--text-secondary); font-size: 0.875rem; }

    .person-focus {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .content-two-col,
    .content-three-col {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .list-stack { display: flex; flex-direction: column; gap: 12px; }

    .entity-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-default);
      background: var(--surface-card);
    }

    .entity-card__top {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .entity-card__title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .entity-card__title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
    }

    .entity-card__note,
    .entity-card__meta {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .entity-card__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
    }

    .entity-card__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .surface-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .empty-state {
      padding: 20px;
      border-radius: var(--radius-md);
      border: 1px dashed var(--border-default);
      background: var(--surface-subtle);
    }
    .empty-state h3 { margin: 0; font-size: 1rem; }
    .empty-state p { margin: 8px 0 0; color: var(--text-secondary); }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .calendar-weekday,
    .calendar-day {
      min-width: 0;
      border-radius: var(--radius-md);
    }

    .calendar-weekday {
      padding: 8px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-tertiary);
      font-weight: 700;
    }

    .calendar-day {
      border: 1px solid var(--border-default);
      background: var(--surface-card);
      padding: 10px;
      min-height: 112px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .calendar-day:hover { transform: translateY(-1px); }
    .calendar-day--muted { opacity: 0.52; }
    .calendar-day--selected { border-color: var(--action-primary); background: var(--surface-accent); }
    .calendar-day--today { box-shadow: inset 0 0 0 1.5px color-mix(in srgb, var(--action-primary) 48%, transparent); }

    .calendar-day__date {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .calendar-day__items {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .calendar-mini-item {
      display: block;
      width: 100%;
      border-radius: 10px;
      padding: 6px 8px;
      font-size: 0.8rem;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      background: var(--surface-subtle);
    }

    .calendar-day-preview {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .warning-callout {
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1px solid color-mix(in srgb, var(--warning) 24%, transparent);
      background: var(--warning-soft);
      color: var(--warning);
      font-weight: 600;
    }

    .activity-item {
      padding: 12px 0;
      border-top: 1px solid var(--border-default);
    }
    .activity-item:first-child { border-top: 0; padding-top: 0; }
    .activity-item p { margin: 0; }
    .activity-item small { display: block; margin-top: 6px; color: var(--text-tertiary); }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .member-settings {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .member-settings__row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-default);
      background: var(--surface-subtle);
    }

    .mobile-bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 12px 12px max(12px, env(safe-area-inset-bottom));
      background: color-mix(in srgb, var(--surface-card-raised) 90%, transparent);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-default);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(16, 12, 14, 0.52);
    }
    .modal.is-open { display: flex; }
    .modal__dialog {
      width: min(720px, 100%);
      max-height: min(86dvh, 960px);
      overflow: auto;
      background: var(--surface-card-raised);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-3);
      padding: 20px;
    }
    .modal__dialog--day {
      width: min(820px, 100%);
    }

    .modal__header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .modal__title { margin: 0; font-size: 1.125rem; }
    .modal__copy { margin: 6px 0 0; color: var(--text-secondary); font-size: .95rem; }

    .screen[hidden] { display: none !important; }

    @media (min-width: 640px) {
      .field-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .member-settings__row { grid-template-columns: 1.2fr .9fr; align-items: end; }
    }

    @media (min-width: 768px) {
      .app-topbar__inner { flex-direction: row; align-items: center; justify-content: space-between; }
      .stats-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .member-strip { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .content-three-col { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .settings-grid { grid-template-columns: 1.2fr .8fr; }
    }

    @media (min-width: 1024px) {
      .app-shell { grid-template-columns: var(--sidebar-width) minmax(0, 1fr); }
      .desktop-sidebar { display: block; }
      .mobile-bottom-nav { display: none; }
      .page-shell { padding: 24px 24px 40px; }
      .content-two-col { grid-template-columns: minmax(0, 1.5fr) minmax(340px, .95fr); }
      .person-focus { grid-template-columns: minmax(0, 1.15fr) minmax(340px, .85fr); }
      .member-settings { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .calendar-grid { gap: 6px; }
      .calendar-day { min-height: 82px; padding: 8px; }
      .calendar-mini-item { font-size: .75rem; padding: 5px 6px; }
      .modal { align-items: end; padding: 0; }
      .modal__dialog {
        width: 100%;
        max-height: 92dvh;
        border-radius: 20px 20px 0 0;
        padding-bottom: max(20px, env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="desktop-sidebar" aria-label="Primary">
      <div class="desktop-sidebar__wrap">
        <div class="desktop-sidebar__panel">
          <div class="desktop-sidebar__brand">
            <h2>Family Group Hub</h2>
            <p>A calm shared board for tasks, bills, appointments, and handoffs.</p>
          </div>
          <nav class="desktop-sidebar__nav" id="desktopNav"></nav>
        </div>
      </div>
    </aside>

    <div class="app-main">
      <header class="app-topbar">
        <div class="app-topbar__inner">
          <div class="app-brand">
            <h1>Family Group Hub</h1>
            <p>Shared household planning without the fog machine of text threads and memory.</p>
          </div>

          <div class="toolbar-actions">
            <label class="pill" for="workingAsSelect">
              Working as
              <select id="workingAsSelect" class="field-select" style="min-height:32px;padding:4px 8px;border-radius:999px;width:auto;background:transparent;border:none;box-shadow:none;">
              </select>
            </label>
            <button class="btn btn--secondary" id="themeToggleBtn" type="button">Toggle Theme</button>
          </div>
        </div>
      </header>

      <main class="page-shell">
        <section id="screen-home" class="screen"></section>
        <section id="screen-tasks" class="screen" hidden></section>
        <section id="screen-calendar" class="screen" hidden></section>
        <section id="screen-payments" class="screen" hidden></section>
        <section id="screen-settings" class="screen" hidden></section>
      </main>
    </div>

    <nav class="mobile-bottom-nav" aria-label="Bottom navigation" id="mobileNav"></nav>
  </div>

  <div class="modal" id="modalRoot" aria-hidden="true">
    <div class="modal__dialog" id="modalDialog">
      <div class="modal__header">
        <div>
          <h2 class="modal__title" id="modalTitle">Edit</h2>
          <p class="modal__copy" id="modalCopy">Update details below.</p>
        </div>
        <button class="btn btn--ghost" type="button" id="modalCloseBtn">Close</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = "family-group-hub-v1-state";
      const THEME_KEY = "family-group-hub-v1-theme";
      const DEFAULT_ROUTE = "home";
      const weekdayLabels = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const navigation = [
        { route: "home", label: "Home" },
        { route: "tasks", label: "Tasks" },
        { route: "calendar", label: "Calendar" },
        { route: "payments", label: "Payments" },
        { route: "settings", label: "Settings" }
      ];

      const memberColorMap = {
        lavender: {
          accent: "var(--member-lavender)",
          surface: "var(--member-lavender-soft)",
          border: "var(--member-lavender-border)"
        },
        navy: {
          accent: "var(--member-navy)",
          surface: "var(--member-navy-soft)",
          border: "var(--member-navy-border)"
        },
        teal: {
          accent: "var(--member-teal)",
          surface: "var(--member-teal-soft)",
          border: "var(--member-teal-border)"
        }
      };

      const state = loadState();
      ensureCalendarState();
      applyTheme();
      bindGlobalEvents();
      renderApp();

      function createInitialState() {
        const today = startOfDay(new Date());
        const tomorrow = addDays(today, 1);
        const next2 = addDays(today, 2);
        const next4 = addDays(today, 4);
        const monthCursor = formatYearMonth(today);

        return {
          ui: {
            route: getRouteFromHash(),
            selectedMemberId: "member-1",
            currentActorMemberId: "member-1",
            theme: localStorage.getItem(THEME_KEY) || "light",
            calendarMonth: monthCursor,
            selectedDay: toDateInput(today),
            taskFilter: "all",
            paymentFilter: "all"
          },
          members: [
            { id: "member-1", name: "Alex", colorKey: "lavender", shortLabel: "A" },
            { id: "member-2", name: "Jordan", colorKey: "navy", shortLabel: "J" },
            { id: "member-3", name: "Taylor", colorKey: "teal", shortLabel: "T" }
          ],
          tasks: [
            {
              id: uid("task"),
              title: "Pick up prescriptions",
              ownerMemberId: "member-2",
              createdByMemberId: "member-1",
              dueDate: toDateInput(tomorrow),
              status: "claimed",
              note: "Ready after 3 PM"
            },
            {
              id: uid("task"),
              title: "Schedule dentist follow-up",
              ownerMemberId: null,
              createdByMemberId: "member-3",
              dueDate: toDateInput(next2),
              status: "open",
              note: "Call before lunch"
            },
            {
              id: uid("task"),
              title: "Laundry and fold towels",
              ownerMemberId: "member-3",
              createdByMemberId: "member-2",
              dueDate: toDateInput(today),
              status: "completed",
              note: "Guest towels too"
            }
          ],
          payments: [
            {
              id: uid("payment"),
              title: "Electric bill",
              responsibleMemberId: "member-2",
              createdByMemberId: "member-1",
              amountCents: 16400,
              dueDate: toDateInput(next4),
              status: "unpaid",
              note: "Auto-pay off this month"
            },
            {
              id: uid("payment"),
              title: "Pediatric co-pay",
              responsibleMemberId: "member-1",
              createdByMemberId: "member-1",
              amountCents: 4500,
              dueDate: toDateInput(tomorrow),
              status: "partial",
              note: "Half already covered"
            },
            {
              id: uid("payment"),
              title: "Internet",
              responsibleMemberId: "member-3",
              createdByMemberId: "member-2",
              amountCents: 7900,
              dueDate: toDateInput(addDays(today, -3)),
              status: "paid",
              note: "Confirmed"
            }
          ],
          events: [
            {
              id: uid("event"),
              title: "Dermatology appointment",
              ownerMemberId: "member-1",
              startAt: combineLocalDateTime(next2, "10:30"),
              endAt: combineLocalDateTime(next2, "11:15"),
              kind: "appointment",
              note: "Bring insurance card"
            },
            {
              id: uid("event"),
              title: "School supply pickup",
              ownerMemberId: "member-2",
              startAt: combineLocalDateTime(addDays(today, 3), "16:00"),
              endAt: combineLocalDateTime(addDays(today, 3), "17:00"),
              kind: "event",
              note: "Main office closes at 5"
            },
            {
              id: uid("event"),
              title: "Trash to curb",
              ownerMemberId: "member-3",
              startAt: combineLocalDateTime(today, "19:00"),
              endAt: "",
              kind: "task-marker",
              note: "Bins + recycling"
            }
          ],
          activity: [
            {
              id: uid("activity"),
              actorMemberId: "member-2",
              message: "Jordan claimed Pick up prescriptions.",
              createdAt: new Date().toISOString()
            },
            {
              id: uid("activity"),
              actorMemberId: "member-1",
              message: "Alex added Electric bill.",
              createdAt: new Date(Date.now() - 1000 * 60 * 40).toISOString()
            },
            {
              id: uid("activity"),
              actorMemberId: "member-3",
              message: "Taylor completed Laundry and fold towels.",
              createdAt: new Date(Date.now() - 1000 * 60 * 60 * 12).toISOString()
            }
          ]
        };
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return createInitialState();
          const parsed = JSON.parse(raw);
          return {
            ...createInitialState(),
            ...parsed,
            ui: {
              ...createInitialState().ui,
              ...(parsed.ui || {})
            }
          };
        } catch (error) {
          console.error("Failed to load state", error);
          return createInitialState();
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function ensureCalendarState() {
        if (!state.ui.calendarMonth) state.ui.calendarMonth = formatYearMonth(new Date());
        if (!state.ui.selectedDay) state.ui.selectedDay = toDateInput(new Date());
      }

      function bindGlobalEvents() {
        window.addEventListener("hashchange", () => {
          state.ui.route = getRouteFromHash();
          renderApp();
        });

        document.getElementById("themeToggleBtn").addEventListener("click", () => {
          state.ui.theme = state.ui.theme === "dark" ? "light" : "dark";
          localStorage.setItem(THEME_KEY, state.ui.theme);
          applyTheme();
          renderApp();
        });

        document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
        document.getElementById("modalRoot").addEventListener("click", (event) => {
          if (event.target.id === "modalRoot") closeModal();
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") closeModal();
        });
      }

      function applyTheme() {
        document.documentElement.setAttribute("data-theme", state.ui.theme || "light");
      }

      function renderApp() {
        state.ui.route = getRouteFromHash();
        renderNavigation();
        renderWorkingAsSelect();
        renderScreens();
        saveState();
      }

      function renderNavigation() {
        const desktopNav = document.getElementById("desktopNav");
        const mobileNav = document.getElementById("mobileNav");
        const html = navigation.map((item) => {
          const activeClass = state.ui.route === item.route
            ? "desktop-sidebar__link desktop-sidebar__link--active"
            : "desktop-sidebar__link";
          const mobileActive = state.ui.route === item.route
            ? "mobile-bottom-nav__link mobile-bottom-nav__link--active"
            : "mobile-bottom-nav__link";
          return {
            desktop: `<a href="#${item.route}" class="${activeClass}">${escapeHtml(item.label)}</a>`,
            mobile: item.route === "settings"
              ? ""
              : `<a href="#${item.route}" class="${mobileActive}">${escapeHtml(item.label)}</a>`
          };
        });
        desktopNav.innerHTML = html.map(item => item.desktop).join("");
        mobileNav.innerHTML = html.map(item => item.mobile).join("");
      }

      function renderWorkingAsSelect() {
        const select = document.getElementById("workingAsSelect");
        select.innerHTML = state.members.map((member) => `
          <option value="${member.id}" ${member.id === state.ui.currentActorMemberId ? "selected" : ""}>${escapeHtml(member.name)}</option>
        `).join("");
        select.onchange = (event) => {
          state.ui.currentActorMemberId = event.target.value;
          saveState();
        };
      }

      function renderScreens() {
        const routes = ["home", "tasks", "calendar", "payments", "settings"];
        routes.forEach((route) => {
          const screen = document.getElementById(`screen-${route}`);
          screen.hidden = route !== state.ui.route;
        });

        document.getElementById("screen-home").innerHTML = renderHomeScreen();
        document.getElementById("screen-tasks").innerHTML = renderTasksScreen();
        document.getElementById("screen-calendar").innerHTML = renderCalendarScreen();
        document.getElementById("screen-payments").innerHTML = renderPaymentsScreen();
        document.getElementById("screen-settings").innerHTML = renderSettingsScreen();

        attachHomeEvents();
        attachTasksEvents();
        attachCalendarEvents();
        attachPaymentsEvents();
        attachSettingsEvents();
      }

      function renderHomeScreen() {
        const stats = getStats();
        const selectedMember = getSelectedMember();
        const memberSummary = getMemberSummary(selectedMember.id);
        const upcomingEvents = sortByDate(state.events, (event) => event.startAt).slice(0, 5);
        const recentActivity = sortByDate(state.activity, (item) => item.createdAt, true).slice(0, 5);

        return `
          <div class="page-stack">
            <div class="surface-card surface-card--raised hero-card">
              <div class="page-intro">
                <span class="eyebrow">Version 1</span>
                <h2>Run the household without a three-person guessing contest.</h2>
                <p>
                  This standalone V1 build gives you a calm shared shell, member-focused accountability, base task/payment/calendar flows,
                  local storage persistence, export/import, and an activity log. No fake corporate cosplay. Just the household board.
                </p>
              </div>
              <div class="inline-actions" style="margin-top:16px;">
                <button type="button" class="btn btn--primary" data-open-modal="task-create">Add Task</button>
                <button type="button" class="btn btn--secondary" data-open-modal="payment-create">Add Payment</button>
                <button type="button" class="btn btn--ghost" data-open-modal="event-create">Add Event</button>
              </div>
            </div>

            <section class="stats-grid" aria-label="Household summary">
              ${stats.map((stat) => renderStatCard(stat)).join("")}
            </section>

            <section>
              <div class="section-header">
                <div class="section-header__copy">
                  <h2 class="section-header__title">Family strip</h2>
                  <p class="section-header__helper">One person open at a time. No more My tab scavenger hunt.</p>
                </div>
              </div>
              <div class="member-strip" style="margin-top:16px;">
                ${state.members.map((member) => renderMemberCard(member)).join("")}
              </div>
            </section>

            <section class="person-focus">
              <div class="surface-card surface-card--raised surface-card--padded" style="background:${memberColorMap[selectedMember.colorKey].surface}; border-color:${memberColorMap[selectedMember.colorKey].border};">
                <div class="section-header">
                  <div class="section-header__copy">
                    <h2 class="section-header__title">${escapeHtml(selectedMember.name)}</h2>
                    <p class="section-header__helper">Focused view for what this person owns right now.</p>
                  </div>
                  <button class="btn btn--ghost" type="button" data-open-modal="member-rename" data-member-id="${selectedMember.id}">Rename</button>
                </div>

                <div class="summary-row" style="margin-top:16px;">
                  <span class="pill">${memberSummary.tasks.length} tasks</span>
                  <span class="pill">${memberSummary.payments.length} payments</span>
                  <span class="pill">${memberSummary.events.length} calendar items</span>
                </div>

                <div class="surface-list" style="margin-top:16px;">
                  ${memberSummary.tasks.length ? memberSummary.tasks.slice(0, 3).map(task => renderTaskCard(task, { compact: true })).join("") : renderEmpty("No tasks assigned", "This person does not own any tasks right now.")}
                </div>
              </div>

              <div class="list-stack">
                <div class="surface-card surface-card--padded">
                  <div class="section-header">
                    <div class="section-header__copy">
                      <h2 class="section-header__title">Payments</h2>
                      <p class="section-header__helper">Money responsibilities this person owns.</p>
                    </div>
                  </div>
                  <div class="surface-list" style="margin-top:16px;">
                    ${memberSummary.payments.length ? memberSummary.payments.slice(0, 2).map(payment => renderPaymentCard(payment, { compact: true })).join("") : `<p class="muted" style="margin:0;">No assigned payments right now.</p>`}
                  </div>
                </div>

                <div class="surface-card surface-card--padded">
                  <div class="section-header">
                    <div class="section-header__copy">
                      <h2 class="section-header__title">Calendar</h2>
                      <p class="section-header__helper">Upcoming appointments and events.</p>
                    </div>
                  </div>
                  <div class="surface-list" style="margin-top:16px;">
                    ${memberSummary.events.length ? memberSummary.events.slice(0, 2).map(event => renderEventCard(event, { compact: true })).join("") : `<p class="muted" style="margin:0;">No scheduled items right now.</p>`}
                  </div>
                </div>
              </div>
            </section>

            <section class="content-two-col">
              <div class="list-stack">
                <div class="surface-card surface-card--padded">
                  <div class="section-header">
                    <div class="section-header__copy">
                      <h2 class="section-header__title">Tasks</h2>
                      <p class="section-header__helper">List-first workspace for what needs action.</p>
                    </div>
                    <button type="button" class="btn btn--secondary" data-open-modal="task-create">Add Task</button>
                  </div>
                  <div class="surface-list" style="margin-top:16px;">
                    ${state.tasks.length ? sortTasksForDisplay(state.tasks).slice(0, 4).map(task => renderTaskCard(task)).join("") : renderEmpty("No tasks yet", "Add the first household task and give it an owner or leave it open.")}
                  </div>
                </div>

                <div class="surface-card surface-card--padded">
                  <div class="section-header">
                    <div class="section-header__copy">
                      <h2 class="section-header__title">Payments</h2>
                      <p class="section-header__helper">Group visibility for what is due, partial, or paid.</p>
                    </div>
                    <button type="button" class="btn btn--secondary" data-open-modal="payment-create">Add Payment</button>
                  </div>
                  <div class="surface-list" style="margin-top:16px;">
                    ${state.payments.length ? sortPaymentsForDisplay(state.payments).slice(0, 4).map(payment => renderPaymentCard(payment)).join("") : renderEmpty("No payments yet", "Add a household bill or payment responsibility.")}
                  </div>
                </div>
              </div>

              <div class="list-stack">
                <div class="surface-card surface-card--padded">
                  <div class="section-header">
                    <div class="section-header__copy">
                      <h2 class="section-header__title">Calendar</h2>
                      <p class="section-header__helper">Preview first, edit second. Less accidental chaos.</p>
                    </div>
                    <button type="button" class="btn btn--ghost" onclick="location.hash='#calendar'">Open Calendar</button>
                  </div>
                  <div class="surface-list" style="margin-top:16px;">
                    ${upcomingEvents.length ? upcomingEvents.map(event => renderEventCard(event)).join("") : renderEmpty("No calendar items yet", "Add an appointment or event to start the shared schedule.")}
                  </div>
                </div>

                <div class="surface-card surface-card--padded">
                  <div class="section-header">
                    <div class="section-header__copy">
                      <h2 class="section-header__title">Activity</h2>
                      <p class="section-header__helper">Visible changes kill the classic who-changed-that argument.</p>
                    </div>
                  </div>
                  <div style="margin-top:16px;">
                    ${recentActivity.length ? recentActivity.map(item => renderActivityItem(item)).join("") : `<p class="muted" style="margin:0;">No activity yet.</p>`}
                  </div>
                </div>
              </div>
            </section>
          </div>
        `;
      }

      function renderTasksScreen() {
        const filter = state.ui.taskFilter || "all";
        const tasks = filterTasks(state.tasks, filter);

        return `
          <div class="page-stack">
            <section class="page-intro">
              <span class="eyebrow">Tasks</span>
              <h2 style="margin:0;">What needs action?</h2>
              <p class="muted" style="margin:0;">Claimable, movable, and visible. Household work should not vanish into a memory hole.</p>
            </section>

            <div class="surface-card surface-card--padded">
              <div class="section-header">
                <div class="section-header__copy">
                  <h2 class="section-header__title">Task workspace</h2>
                  <p class="section-header__helper">Create, claim, reassign, complete, and leave handoff context.</p>
                </div>
                <button class="btn btn--primary" type="button" data-open-modal="task-create">Add Task</button>
              </div>

              <div class="chip-row" style="margin-top:16px;">
                ${renderFilterChip("task-filter", "all", "All", filter)}
                ${renderFilterChip("task-filter", "open", "Open", filter)}
                ${renderFilterChip("task-filter", "claimed", "Claimed", filter)}
                ${renderFilterChip("task-filter", "completed", "Completed", filter)}
              </div>

              <div class="surface-list" style="margin-top:16px;">
                ${tasks.length ? sortTasksForDisplay(tasks).map(task => renderTaskCard(task)).join("") : renderEmpty("No matching tasks", "Nothing fits this filter right now. Either that is good news or everyone is lying to the app.")}
              </div>
            </div>
          </div>
        `;
      }

      function renderCalendarScreen() {
        const currentMonthDate = parseYearMonth(state.ui.calendarMonth);
        const selectedDay = state.ui.selectedDay;
        const monthMeta = getMonthMeta(currentMonthDate);
        const dayItems = getItemsForDay(selectedDay);
        const overlapWarning = getOverlapWarning(dayItems.events);

        return `
          <div class="page-stack">
            <section class="page-intro">
              <span class="eyebrow">Calendar</span>
              <h2 style="margin:0;">What is scheduled and when?</h2>
              <p class="muted" style="margin:0;">Preview first, then edit. The calendar is the planning surface, not decorative wallpaper.</p>
            </section>

            <div class="surface-card surface-card--padded">
              <div class="section-header">
                <div class="section-header__copy">
                  <h2 class="section-header__title">${monthMeta.label}</h2>
                  <p class="section-header__helper">Tap a day to open a day pop-up with everything scheduled there.</p>
                </div>
                <div class="inline-actions">
                  <button type="button" class="btn btn--ghost" id="monthPrevBtn">Prev</button>
                  <button type="button" class="btn btn--ghost" id="monthTodayBtn">Today</button>
                  <button type="button" class="btn btn--ghost" id="monthNextBtn">Next</button>
                  <button type="button" class="btn btn--secondary" data-open-modal="event-create">Add Event</button>
                </div>
              </div>

              <div class="calendar-grid" style="margin-top:16px;">
                ${weekdayLabels.map(label => `<div class="calendar-weekday">${label}</div>`).join("")}
                ${monthMeta.days.map(day => renderCalendarDay(day, selectedDay)).join("")}
              </div>
            </div>

            <div class="surface-card surface-card--padded">
              <div class="section-header">
                <div class="section-header__copy">
                  <h2 class="section-header__title">${formatLongDate(selectedDay)}</h2>
                  <p class="section-header__helper">Selected day snapshot. The click pop-up gives the fuller day view.</p>
                </div>
                <div class="inline-actions" style="gap:8px;"><button type="button" class="btn btn--ghost" data-open-modal="calendar-day" data-prefill-date="${selectedDay}">Open day pop-up</button><button type="button" class="btn btn--secondary" data-open-modal="event-create" data-prefill-date="${selectedDay}">Add to this day</button></div>
              </div>

              <div class="calendar-day-preview" style="margin-top:16px;">
                ${overlapWarning ? `<div class="warning-callout">${escapeHtml(overlapWarning)}</div>` : ""}
                ${(dayItems.events.length || dayItems.tasks.length) ? renderDayPreviewItems(dayItems) : renderEmpty("Nothing scheduled", "No tasks, events, or appointments on this day yet.")}
              </div>
            </div>
          </div>
        `;
      }

      function renderPaymentsScreen() {
        const filter = state.ui.paymentFilter || "all";
        const payments = filterPayments(state.payments, filter);
        const totals = getPaymentTotals();

        return `
          <div class="page-stack">
            <section class="page-intro">
              <span class="eyebrow">Payments</span>
              <h2 style="margin:0;">What is due, partial, or paid?</h2>
              <p class="muted" style="margin:0;">Visibility first. The goal is group awareness, not turning home into an accounting cult.</p>
            </section>

            <section class="stats-grid">
              ${renderStatCard({ label: "Unpaid Total", value: formatCurrency(totals.unpaid), note: "Needs action" })}
              ${renderStatCard({ label: "Partial Total", value: formatCurrency(totals.partial), note: "Already partly handled" })}
              ${renderStatCard({ label: "Paid Total", value: formatCurrency(totals.paid), note: "Closed out" })}
              ${renderStatCard({ label: "All Payments", value: String(state.payments.length), note: "Across the household" })}
            </section>

            <div class="surface-card surface-card--padded">
              <div class="section-header">
                <div class="section-header__copy">
                  <h2 class="section-header__title">Payments workspace</h2>
                  <p class="section-header__helper">Assign responsibility, update status, and keep the bill fog away.</p>
                </div>
                <button class="btn btn--primary" type="button" data-open-modal="payment-create">Add Payment</button>
              </div>

              <div class="chip-row" style="margin-top:16px;">
                ${renderFilterChip("payment-filter", "all", "All", filter)}
                ${renderFilterChip("payment-filter", "unpaid", "Unpaid", filter)}
                ${renderFilterChip("payment-filter", "partial", "Partial", filter)}
                ${renderFilterChip("payment-filter", "paid", "Paid", filter)}
              </div>

              <div class="surface-list" style="margin-top:16px;">
                ${payments.length ? sortPaymentsForDisplay(payments).map(payment => renderPaymentCard(payment)).join("") : renderEmpty("No matching payments", "Nothing matches this filter right now.")}
              </div>
            </div>
          </div>
        `;
      }

      function renderSettingsScreen() {
        return `
          <div class="page-stack">
            <section class="page-intro">
              <span class="eyebrow">Settings</span>
              <h2 style="margin:0;">Household setup and app controls</h2>
              <p class="muted" style="margin:0;">Keep configuration here so Home stays useful instead of bloating into a junk attic.</p>
            </section>

            <section class="settings-grid">
              <div class="surface-card surface-card--padded">
                <div class="section-header">
                  <div class="section-header__copy">
                    <h2 class="section-header__title">Family members</h2>
                    <p class="section-header__helper">Rename people here and keep their identity colors fixed.</p>
                  </div>
                </div>

                <div class="member-settings" style="margin-top:16px;">
                  ${state.members.map(member => `
                    <div class="member-settings__row">
                      <div class="field-group">
                        <label class="field-label" for="member-name-${member.id}">${escapeHtml(getMemberColorLabel(member.colorKey))}</label>
                        <input class="field" id="member-name-${member.id}" data-member-name-input="${member.id}" value="${escapeHtmlAttr(member.name)}" maxlength="24" />
                      </div>
                      <div class="field-group">
                        <span class="field-label">Preview</span>
                        <span class="pill" style="background:${memberColorMap[member.colorKey].surface}; border-color:${memberColorMap[member.colorKey].border}; color:var(--text-primary);">${escapeHtml(member.name)}</span>
                      </div>
                    </div>
                  `).join("")}
                </div>

                <div class="inline-actions" style="margin-top:16px;">
                  <button class="btn btn--primary" id="saveMemberNamesBtn" type="button">Save Names</button>
                </div>
              </div>

              <div class="list-stack">
                <div class="surface-card surface-card--padded">
                  <div class="section-header">
                    <div class="section-header__copy">
                      <h2 class="section-header__title">Theme</h2>
                      <p class="section-header__helper">Calm light and calm dark. No retina flamethrower mode.</p>
                    </div>
                  </div>
                  <div class="inline-actions" style="margin-top:16px;">
                    <button class="btn ${state.ui.theme === 'light' ? 'btn--primary' : 'btn--secondary'}" id="themeLightBtn" type="button">Light</button>
                    <button class="btn ${state.ui.theme === 'dark' ? 'btn--primary' : 'btn--secondary'}" id="themeDarkBtn" type="button">Dark</button>
                  </div>
                </div>

                <div class="surface-card surface-card--padded">
                  <div class="section-header">
                    <div class="section-header__copy">
                      <h2 class="section-header__title">Backup and reset</h2>
                      <p class="section-header__helper">Export the household data, import it later, or reset the board.</p>
                    </div>
                  </div>
                  <div class="list-stack" style="margin-top:16px;">
                    <button class="btn btn--secondary" id="exportBtn" type="button">Export Backup</button>
                    <label class="btn btn--ghost" for="importFileInput">Import Backup</label>
                    <input type="file" id="importFileInput" accept="application/json" hidden />
                    <button class="btn btn--destructive" id="resetAppBtn" type="button">Reset App</button>
                  </div>
                </div>
              </div>
            </section>
          </div>
        `;
      }

      function attachHomeEvents() {
        document.querySelectorAll("#screen-home [data-member-card]").forEach((button) => {
          button.addEventListener("click", () => {
            state.ui.selectedMemberId = button.getAttribute("data-member-card");
            renderApp();
          });
        });

        document.querySelectorAll("#screen-home [data-open-modal]").forEach((button) => {
          button.addEventListener("click", () => {
            openModal(button.getAttribute("data-open-modal"), {
              memberId: button.getAttribute("data-member-id") || "",
              prefillDate: button.getAttribute("data-prefill-date") || ""
            });
          });
        });

        bindEntityActionButtons("#screen-home");
      }

      function attachTasksEvents() {
        document.querySelectorAll("#screen-tasks [data-task-filter]").forEach((button) => {
          button.addEventListener("click", () => {
            state.ui.taskFilter = button.getAttribute("data-task-filter");
            renderApp();
          });
        });

        document.querySelectorAll("#screen-tasks [data-open-modal]").forEach((button) => {
          button.addEventListener("click", () => openModal(button.getAttribute("data-open-modal")));
        });

        bindEntityActionButtons("#screen-tasks");
      }

      function attachCalendarEvents() {
        const prev = document.getElementById("monthPrevBtn");
        const next = document.getElementById("monthNextBtn");
        const todayBtn = document.getElementById("monthTodayBtn");

        if (prev) prev.addEventListener("click", () => shiftCalendarMonth(-1));
        if (next) next.addEventListener("click", () => shiftCalendarMonth(1));
        if (todayBtn) todayBtn.addEventListener("click", () => {
          const now = new Date();
          state.ui.calendarMonth = formatYearMonth(now);
          state.ui.selectedDay = toDateInput(now);
          renderApp();
        });

        document.querySelectorAll("#screen-calendar [data-calendar-day]").forEach((button) => {
          button.addEventListener("click", () => {
            const selectedDate = button.getAttribute("data-calendar-day");
            state.ui.selectedDay = selectedDate;
            renderApp();
            openModal("calendar-day", { date: selectedDate });
          });
        });

        document.querySelectorAll("#screen-calendar [data-open-modal]").forEach((button) => {
          button.addEventListener("click", () => {
            openModal(button.getAttribute("data-open-modal"), {
              prefillDate: button.getAttribute("data-prefill-date") || "",
              date: button.getAttribute("data-prefill-date") || state.ui.selectedDay
            });
          });
        });

        bindEntityActionButtons("#screen-calendar");
      }

      function attachPaymentsEvents() {
        document.querySelectorAll("#screen-payments [data-payment-filter]").forEach((button) => {
          button.addEventListener("click", () => {
            state.ui.paymentFilter = button.getAttribute("data-payment-filter");
            renderApp();
          });
        });

        document.querySelectorAll("#screen-payments [data-open-modal]").forEach((button) => {
          button.addEventListener("click", () => openModal(button.getAttribute("data-open-modal")));
        });

        bindEntityActionButtons("#screen-payments");
      }

      function attachSettingsEvents() {
        const saveNames = document.getElementById("saveMemberNamesBtn");
        if (saveNames) {
          const saveMemberNames = () => {
            state.members.forEach((member) => {
              const input = document.querySelector(`[data-member-name-input="${member.id}"]`);
              if (input) updateMemberName(member.id, input.value || member.name);
            });
            addActivity(`updated family member names.`);
            renderApp();
          };

          saveNames.addEventListener("click", saveMemberNames);
          document.querySelectorAll('[data-member-name-input]').forEach((input) => {
            input.addEventListener('keydown', (event) => {
              if (event.key === 'Enter') {
                event.preventDefault();
                saveMemberNames();
              }
            });
          });
        }

        const themeLightBtn = document.getElementById("themeLightBtn");
        const themeDarkBtn = document.getElementById("themeDarkBtn");
        if (themeLightBtn) themeLightBtn.addEventListener("click", () => setTheme("light"));
        if (themeDarkBtn) themeDarkBtn.addEventListener("click", () => setTheme("dark"));

        const exportBtn = document.getElementById("exportBtn");
        if (exportBtn) exportBtn.addEventListener("click", exportBackup);

        const importInput = document.getElementById("importFileInput");
        if (importInput) {
          importInput.addEventListener("change", importBackup);
        }

        const resetBtn = document.getElementById("resetAppBtn");
        if (resetBtn) {
          resetBtn.addEventListener("click", () => {
            const confirmed = window.confirm("Reset the app back to starter data? This will overwrite the current local version.");
            if (!confirmed) return;
            const fresh = createInitialState();
            Object.keys(state).forEach((key) => delete state[key]);
            Object.assign(state, fresh);
            applyTheme();
            renderApp();
          });
        }
      }

      function bindEntityActionButtons(scopeSelector) {
        const root = scopeSelector ? document.querySelector(scopeSelector) : document;
        if (!root) return;

        root.querySelectorAll("[data-task-action]").forEach((button) => {
          button.addEventListener("click", () => handleTaskAction(button));
        });

        root.querySelectorAll("[data-payment-action]").forEach((button) => {
          button.addEventListener("click", () => handlePaymentAction(button));
        });

        root.querySelectorAll("[data-event-action]").forEach((button) => {
          button.addEventListener("click", () => handleEventAction(button));
        });
      }

      function handleTaskAction(button) {
        const id = button.getAttribute("data-task-id");
        const action = button.getAttribute("data-task-action");
        const task = state.tasks.find((item) => item.id === id);
        if (!task) return;

        if (action === "claim") {
          task.ownerMemberId = state.ui.currentActorMemberId;
          task.status = task.status === "completed" ? "claimed" : "claimed";
          addActivity(`claimed ${task.title}.`);
        }

        if (action === "complete") {
          task.ownerMemberId = task.ownerMemberId || state.ui.currentActorMemberId;
          task.status = "completed";
          addActivity(`completed ${task.title}.`);
        }

        if (action === "reopen") {
          task.status = task.ownerMemberId ? "claimed" : "open";
          addActivity(`reopened ${task.title}.`);
        }

        if (action === "edit") {
          openModal("task-edit", { entityId: id });
          return;
        }

        renderApp();
      }

      function handlePaymentAction(button) {
        const id = button.getAttribute("data-payment-id");
        const action = button.getAttribute("data-payment-action");
        const payment = state.payments.find((item) => item.id === id);
        if (!payment) return;

        if (action === "mark-paid") {
          payment.status = "paid";
          addActivity(`marked ${payment.title} as paid.`);
        }

        if (action === "mark-partial") {
          payment.status = "partial";
          addActivity(`marked ${payment.title} as partial.`);
        }

        if (action === "edit") {
          openModal("payment-edit", { entityId: id });
          return;
        }

        renderApp();
      }

      function handleEventAction(button) {
        const id = button.getAttribute("data-event-id");
        const action = button.getAttribute("data-event-action");
        const event = state.events.find((item) => item.id === id);
        if (!event) return;

        if (action === "edit") {
          openModal("event-edit", { entityId: id });
          return;
        }

        if (action === "jump-day") {
          state.ui.route = "calendar";
          state.ui.calendarMonth = formatYearMonth(new Date(event.startAt));
          state.ui.selectedDay = toDateInput(new Date(event.startAt));
          location.hash = "#calendar";
          renderApp();
        }
      }

      function renderStatCard(stat) {
        return `
          <div class="surface-card surface-card--padded">
            <div class="stat-card__label">${escapeHtml(stat.label)}</div>
            <div class="stat-card__value">${escapeHtml(stat.value)}</div>
            ${stat.note ? `<div class="stat-card__note">${escapeHtml(stat.note)}</div>` : ""}
          </div>
        `;
      }

      function renderMemberCard(member) {
        const isActive = member.id === state.ui.selectedMemberId;
        const tone = memberColorMap[member.colorKey];
        return `
          <button
            type="button"
            class="member-card ${isActive ? 'member-card--active' : ''}"
            data-member-card="${member.id}"
            aria-pressed="${String(isActive)}"
            style="${isActive ? `border-color:${tone.border};background:${tone.surface};` : ''}"
          >
            <p class="member-card__name">${escapeHtml(member.name)}</p>
            <p class="member-card__sub">${isActive ? 'Currently focused' : 'Tap to open this person'}</p>
          </button>
        `;
      }

      function renderTaskCard(task, options = {}) {
        const owner = task.ownerMemberId ? getMember(task.ownerMemberId) : null;
        const tone = task.status === "completed" ? "success" : task.status === "claimed" ? "info" : "warning";
        const compact = Boolean(options.compact);
        return `
          <article class="entity-card">
            <div class="entity-card__top">
              <div class="entity-card__title-row">
                <h3 class="entity-card__title">${escapeHtml(task.title)}</h3>
                ${renderBadge(capitalize(task.status), tone)}
              </div>
              <div class="entity-card__meta">
                <span>Due ${escapeHtml(formatShortDate(task.dueDate))}</span>
                <span>${owner ? `Owner ${escapeHtml(owner.name)}` : 'Open / unclaimed'}</span>
                <span>Created by ${escapeHtml(getMember(task.createdByMemberId).name)}</span>
              </div>
              ${task.note ? `<div class="entity-card__note">${escapeHtml(task.note)}</div>` : ""}
            </div>
            ${compact ? '' : `
              <div class="entity-card__actions">
                ${task.status !== 'completed' ? `<button class="btn btn--secondary" type="button" data-task-action="claim" data-task-id="${task.id}">${task.ownerMemberId === state.ui.currentActorMemberId ? 'Keep Claimed' : task.ownerMemberId ? 'Take Over' : 'Claim'}</button>` : ''}
                ${task.status !== 'completed' ? `<button class="btn btn--ghost" type="button" data-task-action="complete" data-task-id="${task.id}">Complete</button>` : `<button class="btn btn--ghost" type="button" data-task-action="reopen" data-task-id="${task.id}">Reopen</button>`}
                <button class="btn btn--ghost" type="button" data-task-action="edit" data-task-id="${task.id}">Edit</button>
              </div>
            `}
          </article>
        `;
      }

      function renderPaymentCard(payment, options = {}) {
        const owner = payment.responsibleMemberId ? getMember(payment.responsibleMemberId) : null;
        const tone = payment.status === "paid" ? "success" : payment.status === "partial" ? "warning" : "danger";
        const compact = Boolean(options.compact);
        return `
          <article class="entity-card">
            <div class="entity-card__top">
              <div class="entity-card__title-row">
                <h3 class="entity-card__title">${escapeHtml(payment.title)} · ${escapeHtml(formatCurrency(payment.amountCents))}</h3>
                ${renderBadge(capitalize(payment.status), tone)}
              </div>
              <div class="entity-card__meta">
                <span>Due ${escapeHtml(formatShortDate(payment.dueDate))}</span>
                <span>${owner ? `Responsible ${escapeHtml(owner.name)}` : 'No owner yet'}</span>
                <span>Created by ${escapeHtml(getMember(payment.createdByMemberId).name)}</span>
              </div>
              ${payment.note ? `<div class="entity-card__note">${escapeHtml(payment.note)}</div>` : ""}
            </div>
            ${compact ? '' : `
              <div class="entity-card__actions">
                ${payment.status !== 'paid' ? `<button class="btn btn--secondary" type="button" data-payment-action="mark-partial" data-payment-id="${payment.id}">Mark Partial</button>` : ''}
                ${payment.status !== 'paid' ? `<button class="btn btn--ghost" type="button" data-payment-action="mark-paid" data-payment-id="${payment.id}">Mark Paid</button>` : ''}
                <button class="btn btn--ghost" type="button" data-payment-action="edit" data-payment-id="${payment.id}">Edit</button>
              </div>
            `}
          </article>
        `;
      }

      function renderEventCard(event, options = {}) {
        const owner = event.ownerMemberId ? getMember(event.ownerMemberId) : null;
        const compact = Boolean(options.compact);
        const badgeLabel = event.kind === "appointment" ? "Appointment" : event.kind === "task-marker" ? "Task marker" : "Event";
        return `
          <article class="entity-card">
            <div class="entity-card__top">
              <div class="entity-card__title-row">
                <h3 class="entity-card__title">${escapeHtml(event.title)}</h3>
                ${renderBadge(badgeLabel, 'info')}
              </div>
              <div class="entity-card__meta">
                <span>${escapeHtml(formatDateTime(event.startAt))}${event.endAt ? `–${escapeHtml(formatTimeOnly(event.endAt))}` : ''}</span>
                <span>${owner ? `Owner ${escapeHtml(owner.name)}` : 'Household'}</span>
              </div>
              ${event.note ? `<div class="entity-card__note">${escapeHtml(event.note)}</div>` : ""}
            </div>
            ${compact ? '' : `
              <div class="entity-card__actions">
                <button class="btn btn--ghost" type="button" data-event-action="jump-day" data-event-id="${event.id}">Open Day</button>
                <button class="btn btn--ghost" type="button" data-event-action="edit" data-event-id="${event.id}">Edit</button>
              </div>
            `}
          </article>
        `;
      }

      function renderActivityItem(item) {
        const actor = getMember(item.actorMemberId);
        return `
          <div class="activity-item">
            <p>${escapeHtml(item.message)}</p>
            <small>${escapeHtml(actor ? actor.name : 'Someone')} · ${escapeHtml(formatDateTime(item.createdAt))}</small>
          </div>
        `;
      }

      function renderBadge(label, tone) {
        return `<span class="badge badge--${tone}">${escapeHtml(label)}</span>`;
      }

      function renderEmpty(title, message) {
        return `
          <div class="empty-state">
            <h3>${escapeHtml(title)}</h3>
            <p>${escapeHtml(message)}</p>
          </div>
        `;
      }

      function renderFilterChip(attribute, value, label, activeValue) {
        const active = value === activeValue;
        return `<button type="button" class="pill" data-${attribute}="${value}" style="${active ? 'background:var(--action-secondary); color:var(--text-primary); border-color:var(--border-strong);' : ''}">${escapeHtml(label)}</button>`;
      }

      function renderCalendarDay(day, selectedDay) {
        const allItems = getItemsForDay(day.date);
        const items = [...allItems.events, ...allItems.tasks.map(task => ({ title: task.title }))].slice(0, 3);
        const classes = [
          "calendar-day",
          day.isCurrentMonth ? "" : "calendar-day--muted",
          day.date === selectedDay ? "calendar-day--selected" : "",
          day.date === toDateInput(new Date()) ? "calendar-day--today" : ""
        ].filter(Boolean).join(" ");

        return `
          <button type="button" class="${classes}" data-calendar-day="${day.date}">
            <div class="calendar-day__date">
              <span>${escapeHtml(String(day.dayOfMonth))}</span>
              ${day.date === toDateInput(new Date()) ? '<span class="badge badge--info">Today</span>' : ''}
            </div>
            <div class="calendar-day__items">
              ${items.map(item => `<span class="calendar-mini-item">${escapeHtml(item.title)}</span>`).join("")}
            </div>
          </button>
        `;
      }

      function renderCalendarDayModal(date) {
        const dayItems = getItemsForDay(date);
        const overlapWarning = getOverlapWarning(dayItems.events);
        return `
          <div class="list-stack">
            <div class="inline-actions" style="justify-content:space-between; align-items:center; flex-wrap:wrap;">
              <div class="inline-actions" style="gap:8px;">
                <span class="pill">${dayItems.tasks.length} tasks</span>
                <span class="pill">${dayItems.events.length} events</span>
              </div>
              <div class="inline-actions" style="gap:8px;">
                <button type="button" class="btn btn--secondary" data-open-modal="task-create" data-prefill-date="${date}">Add Task</button>
                <button type="button" class="btn btn--primary" data-open-modal="event-create" data-prefill-date="${date}">Add Event</button>
              </div>
            </div>
            ${overlapWarning ? `<div class="warning-callout">${escapeHtml(overlapWarning)}</div>` : ""}
            ${(dayItems.events.length || dayItems.tasks.length)
              ? renderDayPreviewItems(dayItems)
              : renderEmpty("Nothing scheduled", "No tasks, events, or appointments on this day yet.")}
          </div>
        `;
      }

      function renderDayPreviewItems(dayItems) {
        const parts = [];
        if (dayItems.tasks.length) {
          parts.push(`
            <div class="surface-card surface-card--padded">
              <div class="section-header">
                <div class="section-header__copy">
                  <h2 class="section-header__title">Tasks due this day</h2>
                  <p class="section-header__helper">Household tasks should show up on the planning surface too.</p>
                </div>
              </div>
              <div class="surface-list" style="margin-top:16px;">${dayItems.tasks.map(task => renderTaskCard(task, { compact: true })).join("")}</div>
            </div>
          `);
        }
        if (dayItems.events.length) {
          parts.push(dayItems.events.map(event => renderEventCard(event)).join(""));
        }
        return parts.join("");
      }

      function openModal(kind, context = {}) {
        const modal = document.getElementById("modalRoot");
        const title = document.getElementById("modalTitle");
        const copy = document.getElementById("modalCopy");
        const body = document.getElementById("modalBody");
        const dialog = document.getElementById("modalDialog");
        dialog.className = "modal__dialog";

        if (kind === "task-create") {
          title.textContent = "Add task";
          copy.textContent = "Create a household task. Leave it open or assign it now.";
          body.innerHTML = renderTaskForm({ dueDate: context.prefillDate || state.ui.selectedDay });
          bindTaskFormSubmit();
        }

        if (kind === "task-edit") {
          const task = state.tasks.find((item) => item.id === context.entityId);
          if (!task) return;
          title.textContent = "Edit task";
          copy.textContent = "Update title, owner, due date, status, or handoff note.";
          body.innerHTML = renderTaskForm(task);
          bindTaskFormSubmit(task.id);
        }

        if (kind === "payment-create") {
          title.textContent = "Add payment";
          copy.textContent = "Create a bill or payment item with a responsible person and status.";
          body.innerHTML = renderPaymentForm();
          bindPaymentFormSubmit();
        }

        if (kind === "payment-edit") {
          const payment = state.payments.find((item) => item.id === context.entityId);
          if (!payment) return;
          title.textContent = "Edit payment";
          copy.textContent = "Update amount, ownership, date, note, or status.";
          body.innerHTML = renderPaymentForm(payment);
          bindPaymentFormSubmit(payment.id);
        }

        if (kind === "event-create") {
          title.textContent = "Add event";
          copy.textContent = "Create an appointment, event, or task marker for the shared calendar.";
          body.innerHTML = renderEventForm(null, context.prefillDate || state.ui.selectedDay);
          bindEventFormSubmit();
        }

        if (kind === "event-edit") {
          const event = state.events.find((item) => item.id === context.entityId);
          if (!event) return;
          title.textContent = "Edit event";
          copy.textContent = "Update date, time, kind, owner, or note.";
          body.innerHTML = renderEventForm(event);
          bindEventFormSubmit(event.id);
        }

        if (kind === "calendar-day") {
          const activeDate = context.date || state.ui.selectedDay;
          title.textContent = formatLongDate(activeDate);
          copy.textContent = "Day pop-up for tasks, appointments, and quick edits. Click less. See more.";
          dialog.classList.add("modal__dialog--day");
          body.innerHTML = renderCalendarDayModal(activeDate);
          body.querySelectorAll("[data-open-modal]").forEach((button) => {
            button.addEventListener("click", () => {
              openModal(button.getAttribute("data-open-modal"), {
                prefillDate: button.getAttribute("data-prefill-date") || activeDate,
                entityId: button.getAttribute("data-entity-id") || ""
              });
            });
          });
          bindEntityActionButtons("#modalBody");
        }

        if (kind === "member-rename") {
          const member = state.members.find((item) => item.id === context.memberId);
          if (!member) return;
          title.textContent = "Rename member";
          copy.textContent = "Update the display name for this person.";
          body.innerHTML = `
            <form id="renameMemberForm" class="list-stack">
              <div class="field-group">
                <label class="field-label" for="renameMemberInput">Name</label>
                <input id="renameMemberInput" class="field" maxlength="24" value="${escapeHtmlAttr(member.name)}" />
              </div>
              <div class="inline-actions">
                <button class="btn btn--primary" type="submit">Save Name</button>
                <button class="btn btn--ghost" type="button" id="renameMemberCancelBtn">Cancel</button>
              </div>
            </form>
          `;
          const renameInput = document.getElementById("renameMemberInput");
          document.getElementById("renameMemberForm").addEventListener("submit", (event) => {
            event.preventDefault();
            const savedName = updateMemberName(member.id, renameInput.value || member.name);
            addActivity(`renamed ${savedName}.`);
            closeModal();
            renderApp();
          });
          document.getElementById("renameMemberCancelBtn").addEventListener("click", closeModal);
          renameInput.focus();
          renameInput.select();
        }

        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden", "false");
      }

      function closeModal() {
        const modal = document.getElementById("modalRoot");
        const dialog = document.getElementById("modalDialog");
        modal.classList.remove("is-open");
        dialog.className = "modal__dialog";
        modal.setAttribute("aria-hidden", "true");
        document.getElementById("modalBody").innerHTML = "";
      }

      function renderTaskForm(task) {
        return `
          <form id="taskForm" class="list-stack">
            <div class="field-group">
              <label class="field-label" for="taskTitle">Task title</label>
              <input id="taskTitle" class="field" maxlength="80" required value="${escapeHtmlAttr(task?.title || '')}" />
            </div>

            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="taskOwner">Responsible person</label>
                <select id="taskOwner" class="field-select">
                  <option value="">Leave open / unclaimed</option>
                  ${state.members.map(member => `<option value="${member.id}" ${task?.ownerMemberId === member.id ? 'selected' : ''}>${escapeHtml(member.name)}</option>`).join("")}
                </select>
              </div>
              <div class="field-group">
                <label class="field-label" for="taskStatus">Status</label>
                <select id="taskStatus" class="field-select">
                  ${["open", "claimed", "completed"].map(status => `<option value="${status}" ${(task?.status || 'open') === status ? 'selected' : ''}>${capitalize(status)}</option>`).join("")}
                </select>
              </div>
            </div>

            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="taskDueDate">Due date</label>
                <input id="taskDueDate" class="field" type="date" value="${escapeHtmlAttr(task?.dueDate || '')}" />
              </div>
              <div class="field-group">
                <label class="field-label" for="taskCreatedBy">Created by</label>
                <select id="taskCreatedBy" class="field-select">
                  ${state.members.map(member => `<option value="${member.id}" ${(task?.createdByMemberId || state.ui.currentActorMemberId) === member.id ? 'selected' : ''}>${escapeHtml(member.name)}</option>`).join("")}
                </select>
              </div>
            </div>

            <div class="field-group">
              <label class="field-label" for="taskNote">Note</label>
              <textarea id="taskNote" class="field-textarea" maxlength="240">${escapeHtml(task?.note || '')}</textarea>
            </div>

            <div class="inline-actions">
              <button class="btn btn--primary" type="submit">${task ? 'Save Task' : 'Create Task'}</button>
              <button class="btn btn--ghost" type="button" id="taskFormCancelBtn">Cancel</button>
            </div>
          </form>
        `;
      }

      function bindTaskFormSubmit(editId = null) {
        const form = document.getElementById("taskForm");
        if (!form) return;
        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const title = document.getElementById("taskTitle").value.trim();
          if (!title) return;
