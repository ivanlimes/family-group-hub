          const payload = {
            title,
            ownerMemberId: document.getElementById("taskOwner").value || null,
            status: document.getElementById("taskStatus").value,
            dueDate: document.getElementById("taskDueDate").value || null,
            createdByMemberId: document.getElementById("taskCreatedBy").value || state.ui.currentActorMemberId,
            note: document.getElementById("taskNote").value.trim()
          };

          if (editId) {
            const task = state.tasks.find((item) => item.id === editId);
            Object.assign(task, payload);
            addActivity(`updated task ${task.title}.`);
          } else {
            state.tasks.unshift({ id: uid("task"), ...payload });
            addActivity(`added task ${payload.title}.`);
          }

          closeModal();
          renderApp();
        });
        document.getElementById("taskFormCancelBtn").addEventListener("click", closeModal);
      }

      function renderPaymentForm(payment) {
        return `
          <form id="paymentForm" class="list-stack">
            <div class="field-group">
              <label class="field-label" for="paymentTitle">Payment title</label>
              <input id="paymentTitle" class="field" maxlength="80" required value="${escapeHtmlAttr(payment?.title || '')}" />
            </div>

            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="paymentAmount">Amount</label>
                <input id="paymentAmount" class="field" type="number" step="0.01" min="0" value="${payment ? (payment.amountCents / 100).toFixed(2) : ''}" />
              </div>
              <div class="field-group">
                <label class="field-label" for="paymentStatus">Status</label>
                <select id="paymentStatus" class="field-select">
                  ${["unpaid", "partial", "paid"].map(status => `<option value="${status}" ${(payment?.status || 'unpaid') === status ? 'selected' : ''}>${capitalize(status)}</option>`).join("")}
                </select>
              </div>
            </div>

            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="paymentOwner">Responsible person</label>
                <select id="paymentOwner" class="field-select">
                  <option value="">No owner yet</option>
                  ${state.members.map(member => `<option value="${member.id}" ${payment?.responsibleMemberId === member.id ? 'selected' : ''}>${escapeHtml(member.name)}</option>`).join("")}
                </select>
              </div>
              <div class="field-group">
                <label class="field-label" for="paymentDueDate">Due date</label>
                <input id="paymentDueDate" class="field" type="date" value="${escapeHtmlAttr(payment?.dueDate || '')}" />
              </div>
            </div>

            <div class="field-group">
              <label class="field-label" for="paymentNote">Note</label>
              <textarea id="paymentNote" class="field-textarea" maxlength="240">${escapeHtml(payment?.note || '')}</textarea>
            </div>

            <div class="inline-actions">
              <button class="btn btn--primary" type="submit">${payment ? 'Save Payment' : 'Create Payment'}</button>
              <button class="btn btn--ghost" type="button" id="paymentFormCancelBtn">Cancel</button>
            </div>
          </form>
        `;
      }

      function bindPaymentFormSubmit(editId = null) {
        const form = document.getElementById("paymentForm");
        if (!form) return;
        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const title = document.getElementById("paymentTitle").value.trim();
          if (!title) return;

          const payload = {
            title,
            responsibleMemberId: document.getElementById("paymentOwner").value || null,
            createdByMemberId: state.ui.currentActorMemberId,
            amountCents: Math.round(Number(document.getElementById("paymentAmount").value || 0) * 100),
            dueDate: document.getElementById("paymentDueDate").value || null,
            status: document.getElementById("paymentStatus").value,
            note: document.getElementById("paymentNote").value.trim()
          };

          if (editId) {
            const payment = state.payments.find((item) => item.id === editId);
            Object.assign(payment, payload);
            addActivity(`updated payment ${payment.title}.`);
          } else {
            state.payments.unshift({ id: uid("payment"), ...payload });
            addActivity(`added payment ${payload.title}.`);
          }

          closeModal();
          renderApp();
        });
        document.getElementById("paymentFormCancelBtn").addEventListener("click", closeModal);
      }

      function renderEventForm(event, prefillDate = "") {
        const dateValue = event ? toDateInput(new Date(event.startAt)) : (prefillDate || state.ui.selectedDay || toDateInput(new Date()));
        const startValue = event ? toTimeInput(new Date(event.startAt)) : "09:00";
        const endValue = event?.endAt ? toTimeInput(new Date(event.endAt)) : "";

        return `
          <form id="eventForm" class="list-stack">
            <div class="field-group">
              <label class="field-label" for="eventTitle">Event title</label>
              <input id="eventTitle" class="field" maxlength="80" required value="${escapeHtmlAttr(event?.title || '')}" />
            </div>

            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="eventKind">Type</label>
                <select id="eventKind" class="field-select">
                  ${[
                    { value: 'appointment', label: 'Appointment' },
                    { value: 'event', label: 'Event' },
                    { value: 'task-marker', label: 'Task marker' }
                  ].map(option => `<option value="${option.value}" ${(event?.kind || 'appointment') === option.value ? 'selected' : ''}>${option.label}</option>`).join("")}
                </select>
              </div>
              <div class="field-group">
                <label class="field-label" for="eventOwner">Owner</label>
                <select id="eventOwner" class="field-select">
                  <option value="">Household</option>
                  ${state.members.map(member => `<option value="${member.id}" ${event?.ownerMemberId === member.id ? 'selected' : ''}>${escapeHtml(member.name)}</option>`).join("")}
                </select>
              </div>
            </div>

            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="eventDate">Date</label>
                <input id="eventDate" class="field" type="date" value="${escapeHtmlAttr(dateValue)}" />
              </div>
              <div class="field-group">
                <label class="field-label" for="eventStartTime">Start time</label>
                <input id="eventStartTime" class="field" type="time" value="${escapeHtmlAttr(startValue)}" />
              </div>
            </div>

            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="eventEndTime">End time</label>
                <input id="eventEndTime" class="field" type="time" value="${escapeHtmlAttr(endValue)}" />
              </div>
              <div class="field-group">
                <label class="field-label" for="eventNote">Note</label>
                <input id="eventNote" class="field" maxlength="120" value="${escapeHtmlAttr(event?.note || '')}" />
              </div>
            </div>

            <div class="inline-actions">
              <button class="btn btn--primary" type="submit">${event ? 'Save Event' : 'Create Event'}</button>
              <button class="btn btn--ghost" type="button" id="eventFormCancelBtn">Cancel</button>
            </div>
          </form>
        `;
      }

      function bindEventFormSubmit(editId = null) {
        const form = document.getElementById("eventForm");
        if (!form) return;
        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const title = document.getElementById("eventTitle").value.trim();
          if (!title) return;

          const date = document.getElementById("eventDate").value || state.ui.selectedDay;
          const startTime = document.getElementById("eventStartTime").value || "09:00";
          const endTime = document.getElementById("eventEndTime").value || "";
          const payload = {
            title,
            ownerMemberId: document.getElementById("eventOwner").value || null,
            kind: document.getElementById("eventKind").value,
            startAt: combineDateStringAndTime(date, startTime),
            endAt: endTime ? combineDateStringAndTime(date, endTime) : "",
            note: document.getElementById("eventNote").value.trim()
          };

          if (editId) {
            const eventRecord = state.events.find((item) => item.id === editId);
            Object.assign(eventRecord, payload);
            addActivity(`updated event ${eventRecord.title}.`);
          } else {
            state.events.unshift({ id: uid("event"), ...payload });
            addActivity(`added event ${payload.title}.`);
          }

          state.ui.calendarMonth = formatYearMonth(new Date(payload.startAt));
          state.ui.selectedDay = date;
          closeModal();
          renderApp();
        });
        document.getElementById("eventFormCancelBtn").addEventListener("click", closeModal);
      }

      function getStats() {
        const today = toDateInput(new Date());
        const openTasks = state.tasks.filter(task => task.status !== "completed");
        const claimedTasks = state.tasks.filter(task => task.status === "claimed");
        const dueToday = state.tasks.filter(task => task.dueDate === today);
        const paymentTotals = getPaymentTotals();
        return [
          { label: "Open Tasks", value: String(openTasks.length), note: `${dueToday.length} due today` },
          { label: "Claimed Tasks", value: String(claimedTasks.length), note: "Visible ownership" },
          { label: "Unpaid Total", value: formatCurrency(paymentTotals.unpaid), note: "Needs action" },
          { label: "Appointments", value: String(state.events.filter(event => event.kind === 'appointment').length), note: "Shared schedule" }
        ];
      }

      function getPaymentTotals() {
        return state.payments.reduce((acc, payment) => {
          acc[payment.status] += payment.amountCents;
          return acc;
        }, { unpaid: 0, partial: 0, paid: 0 });
      }

      function getSelectedMember() {
        return getMember(state.ui.selectedMemberId) || state.members[0];
      }

      function getMember(id) {
        return state.members.find((member) => member.id === id) || null;
      }

      function getMemberSummary(memberId) {
        return {
          tasks: sortTasksForDisplay(state.tasks.filter(task => task.ownerMemberId === memberId)),
          payments: sortPaymentsForDisplay(state.payments.filter(payment => payment.responsibleMemberId === memberId)),
          events: sortByDate(state.events.filter(event => event.ownerMemberId === memberId), event => event.startAt)
        };
      }

      function sortTasksForDisplay(tasks) {
        const statusRank = { open: 0, claimed: 1, completed: 2 };
        return [...tasks].sort((a, b) => {
          const aRank = statusRank[a.status] ?? 99;
          const bRank = statusRank[b.status] ?? 99;
          if (aRank !== bRank) return aRank - bRank;
          if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
          if (a.dueDate) return -1;
          if (b.dueDate) return 1;
          return a.title.localeCompare(b.title);
        });
      }

      function sortPaymentsForDisplay(payments) {
        const statusRank = { unpaid: 0, partial: 1, paid: 2 };
        return [...payments].sort((a, b) => {
          const aRank = statusRank[a.status] ?? 99;
          const bRank = statusRank[b.status] ?? 99;
          if (aRank !== bRank) return aRank - bRank;
          if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
          if (a.dueDate) return -1;
          if (b.dueDate) return 1;
          return a.title.localeCompare(b.title);
        });
      }

      function sortByDate(items, accessor, desc = false) {
        return [...items].sort((a, b) => {
          const aDate = new Date(accessor(a)).getTime();
          const bDate = new Date(accessor(b)).getTime();
          return desc ? bDate - aDate : aDate - bDate;
        });
      }

      function filterTasks(tasks, filter) {
        if (filter === "all") return tasks;
        return tasks.filter(task => task.status === filter);
      }

      function filterPayments(payments, filter) {
        if (filter === "all") return payments;
        return payments.filter(payment => payment.status === filter);
      }

      function getItemsForDay(dateString) {
        const events = sortByDate(
          state.events.filter(event => toDateInput(new Date(event.startAt)) === dateString),
          event => event.startAt
        );
        const tasks = state.tasks.filter(task => task.dueDate === dateString);
        return { events, tasks };
      }

      function getOverlapWarning(events) {
        const appointments = events.filter(event => event.endAt);
        for (let i = 0; i < appointments.length; i++) {
          for (let j = i + 1; j < appointments.length; j++) {
            const aStart = new Date(appointments[i].startAt).getTime();
            const aEnd = new Date(appointments[i].endAt).getTime();
            const bStart = new Date(appointments[j].startAt).getTime();
            const bEnd = new Date(appointments[j].endAt).getTime();
            if (aStart < bEnd && bStart < aEnd) {
              return `Conflict warning: ${appointments[i].title} overlaps with ${appointments[j].title}.`;
            }
          }
        }
        return "";
      }

      function getMonthMeta(currentMonthDate) {
        const year = currentMonthDate.getFullYear();
        const month = currentMonthDate.getMonth();
        const first = new Date(year, month, 1);
        const last = new Date(year, month + 1, 0);
        const startOffset = first.getDay();
        const totalCells = Math.ceil((startOffset + last.getDate()) / 7) * 7;
        const startDate = addDays(first, -startOffset);
        const days = Array.from({ length: totalCells }, (_, index) => {
          const day = addDays(startDate, index);
          return {
            date: toDateInput(day),
            dayOfMonth: day.getDate(),
            isCurrentMonth: day.getMonth() === month
          };
        });
        return {
          label: first.toLocaleDateString(undefined, { month: 'long', year: 'numeric' }),
          days
        };
      }

      function shiftCalendarMonth(direction) {
        const current = parseYearMonth(state.ui.calendarMonth);
        current.setMonth(current.getMonth() + direction);
        state.ui.calendarMonth = formatYearMonth(current);
        renderApp();
      }

      function setTheme(theme) {
        state.ui.theme = theme;
        localStorage.setItem(THEME_KEY, theme);
        applyTheme();
        renderApp();
      }

      function exportBackup() {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `family-group-hub-backup-${toDateInput(new Date())}.json`;
        link.click();
        URL.revokeObjectURL(url);
      }

      function importBackup(event) {
        const file = event.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const imported = JSON.parse(String(reader.result));
            const fresh = createInitialState();
            Object.keys(state).forEach((key) => delete state[key]);
            Object.assign(state, fresh, imported, { ui: { ...fresh.ui, ...(imported.ui || {}) } });
            applyTheme();
            renderApp();
          } catch (error) {
            alert("That backup file could not be read. The file might be malformed.");
          }
        };
        reader.readAsText(file);
        event.target.value = "";
      }

      function addActivity(messageTail) {
        const actor = getMember(state.ui.currentActorMemberId) || state.members[0];
        const message = `${actor.name} ${messageTail}`;
        state.activity.unshift({
          id: uid("activity"),
          actorMemberId: actor.id,
          message,
          createdAt: new Date().toISOString()
        });
      }

      function uid(prefix) {
        return `${prefix}-${Math.random().toString(36).slice(2, 10)}-${Date.now().toString(36).slice(-5)}`;
      }

      function getRouteFromHash() {
        const raw = (location.hash || `#${DEFAULT_ROUTE}`).replace(/^#/, "");
        return navigation.some(item => item.route === raw) ? raw : DEFAULT_ROUTE;
      }

      function formatCurrency(cents) {
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }).format((cents || 0) / 100);
      }

      function formatShortDate(value) {
        if (!value) return "No date";
        return new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric" }).format(new Date(value));
      }

      function formatLongDate(value) {
        if (!value) return "No date selected";
        return new Intl.DateTimeFormat("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" }).format(new Date(value));
      }

      function formatDateTime(value) {
        return new Intl.DateTimeFormat("en-US", {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit"
        }).format(new Date(value));
      }

      function formatTimeOnly(value) {
        return new Intl.DateTimeFormat("en-US", { hour: "numeric", minute: "2-digit" }).format(new Date(value));
      }

      function capitalize(value) {
        return value ? value.charAt(0).toUpperCase() + value.slice(1) : "";
      }

      function getMemberColorLabel(colorKey) {
        if (colorKey === "lavender") return "Lavender member";
        if (colorKey === "navy") return "Navy member";
        return "Teal member";
      }

      function cleanName(value) {
        return value.replace(/\s+/g, " ").trim().slice(0, 24) || "Family Member";
      }

      function updateMemberName(memberId, value) {
        const nextName = cleanName(String(value || ""));
        let appliedName = null;
        state.members = state.members.map((member) => {
          if (member.id !== memberId) return member;
          appliedName = nextName;
          return { ...member, name: nextName };
        });
        return appliedName;
      }

      function startOfDay(date) {
        const clone = new Date(date);
        clone.setHours(0, 0, 0, 0);
        return clone;
      }

      function addDays(date, days) {
        const clone = new Date(date);
        clone.setDate(clone.getDate() + days);
        return clone;
      }

      function toDateInput(date) {
        const year = date.getFullYear();
        const month = `${date.getMonth() + 1}`.padStart(2, "0");
        const day = `${date.getDate()}`.padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function toTimeInput(date) {
        const hours = `${date.getHours()}`.padStart(2, "0");
        const minutes = `${date.getMinutes()}`.padStart(2, "0");
        return `${hours}:${minutes}`;
      }

      function formatYearMonth(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
      }

      function parseYearMonth(yearMonth) {
        const [year, month] = yearMonth.split("-").map(Number);
        return new Date(year, month - 1, 1);
      }

      function combineLocalDateTime(dateObj, timeStr) {
        return combineDateStringAndTime(toDateInput(dateObj), timeStr);
      }

      function combineDateStringAndTime(dateStr, timeStr) {
        return `${dateStr}T${timeStr}:00`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeHtmlAttr(value) {
        return escapeHtml(value).replaceAll("`", "&#96;");
      }
    })();
  </script>
</body>
</html>
